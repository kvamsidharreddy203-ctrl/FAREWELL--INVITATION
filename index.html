<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Party 2026 | Mechanical Engineering</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            background-color: #0a0a0c; 
        }

        /* Industrial Neon Gradient */
        .party-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%);
            z-index: 0;
        }

        /* Mechanical Particles Container */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .mech-particle {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            opacity: 0.7;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
        }

        /* Main Content Styling */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 0 20px;
            color: #ffffff;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .content.visible {
            opacity: 1;
        }

        /* College Header Area */
        .college-header {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 25px;
            border-radius: 10px;
            border-top: 2px solid #ffaa00;
            border-bottom: 2px solid #ffaa00;
        }

        .college-name {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ccc;
            margin: 0;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* Neon Text */
        .neon-text {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            color: #fff;
            text-shadow: 
                0 0 5px #fff, 
                0 0 10px #ffaa00, 
                0 0 20px #ffaa00, 
                0 0 40px #ff3300, 
                0 0 80px #ff3300;
            animation: pulsate 2s infinite alternate;
        }

        @keyframes pulsate {
            100% { text-shadow: 0 0 4px #fff, 0 0 11px #ffaa00, 0 0 19px #ffaa00, 0 0 40px #ff3300, 0 0 80px #ff3300; }
            0% { text-shadow: 0 0 2px #fff, 0 0 4px #ffaa00, 0 0 6px #ffaa00, 0 0 10px #ff3300, 0 0 45px #ff3300; }
        }

        .sub-text {
            font-size: 1.3rem;
            margin-top: 15px;
            letter-spacing: 2px;
            background: rgba(20, 20, 20, 0.8);
            padding: 10px 25px;
            border-radius: 5px;
            border: 2px solid #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
            text-transform: uppercase;
        }

        .highlight {
            color: #00e5ff;
            font-weight: bold;
            text-shadow: 0 0 8px #00e5ff;
        }

        /* Event Details Box */
        .event-details {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 30px;
            border-radius: 10px;
            border-left: 4px solid #00e5ff;
            border-right: 4px solid #00e5ff;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.8;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .event-details p {
            margin: 10px 0;
            color: #e0e0e0;
        }

        .event-details .icon {
            margin-right: 12px;
            font-size: 1.3rem;
            vertical-align: middle;
        }

        .event-details strong {
            color: #ffaa00;
            letter-spacing: 1px;
        }

        /* Entry Button Area */
        #entry-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column; /* Stack button and text */
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease-out;
        }

        .start-btn {
            background: transparent;
            color: #ffaa00;
            border: 2px solid #ffaa00;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.2) inset, 0 0 15px rgba(255, 170, 0, 0.2);
        }

        .start-btn:hover {
            background: #ffaa00;
            color: #050505;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6) inset, 0 0 30px rgba(255, 170, 0, 0.6);
            transform: scale(1.05);
        }

        /* New Tap Instruction Text */
        .tap-instruction {
            color: #ffaa00;
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: blink 1.5s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="engine-sfx" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="bg-music" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mpeg">
    </audio>

    <div id="entry-screen">
        <button class="start-btn" onclick="startParty()">Ignite the Engines</button>
        <p class="tap-instruction">( Tap Me To Start )</p>
    </div>

    <div class="party-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="content" id="main-content">
        
        <div class="college-header">
            <h2 class="college-name">SV College of Engineering, Tirupati</h2>
        </div>

        <h1 class="neon-text">Farewell Party</h1>
        <p class="sub-text">Mechanical Engineering <span class="highlight">Batch (2022–2026)</span></p>

        <div class="event-details">
            <p><span class="icon">📅</span> <strong>DATE:</strong> Wednesday, April 8, 2026</p>
            <p><span class="icon">🕒</span> <strong>TIME:</strong> 6:00 PM</p>
            <p><span class="icon">📍</span> <strong>VENUE:</strong> Subbayya Gari Hotel,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Tiruchanoor Road, Tirupati</p>
        </div>

    </div>

    <script>
        function startParty() {
            const engineSound = document.getElementById('engine-sfx');
            const music = document.getElementById('bg-music');
            
            engineSound.volume = 0.8;
            music.volume = 0.6; 
            
            engineSound.play().catch(e => console.log("Audio play failed.", e));

            const entryScreen = document.getElementById('entry-screen');
            entryScreen.style.opacity = '0';
            
            setTimeout(() => {
                entryScreen.style.display = 'none';
                document.getElementById('main-content').classList.add('visible');
                createMechParticles();
                
                setTimeout(() => {
                    music.play().catch(e => console.log("Music play failed.", e));
                }, 1500);
                
            }, 1000);
        }

        function createMechParticles() {
            const container = document.getElementById('particles');
            const particleCount = 60; 
            const mechItems = ['⚙️', '🔩', '🔧', '✨', '⚡'];
            
            function spawnParticle() {
                let particle = document.createElement('div');
                particle.className = 'mech-particle';
                particle.innerText = mechItems[Math.floor(Math.random() * mechItems.length)];
                
                let sizeScale = Math.random() * 1.5 + 0.5; 
                particle.style.transform = `scale(${sizeScale})`;
                particle.style.left = Math.random() * 100 + 'vw';
                
                let duration = Math.random() * 6 + 4; 
                particle.style.animationDuration = duration + 's';
                
                container.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                    spawnParticle();
                }, duration * 1000);
            }

            for (let i = 0; i < particleCount; i++) {
                setTimeout(spawnParticle, Math.random() * 5000);
            }
        }
    </script>

</body>
</html>
